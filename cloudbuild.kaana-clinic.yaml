steps:
  # ── Build & deploy Clinic desk (clinic.kaana.in) ───────────────────────
  - id: build-clinic
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/clinic:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/clinic:latest
      - --build-arg
      - VITE_WHATSAPP_API=${_VITE_WHATSAPP_API}
      - --build-arg
      - VITE_PLATFORM_URL=${_VITE_PLATFORM_URL}
      - --build-arg
      - VITE_INBOX_URL=${_VITE_INBOX_URL}
      - ./clinic-crm

  - id: push-clinic
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/clinic

  - id: deploy-clinic
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/clinic:$BUILD_ID"
        gcloud run deploy "${_CLINIC_SERVICE}" \
          --image "$$IMAGE" \
          --region "${_REGION}" \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --min-instances 0 \
          --max-instances 3 \
          --memory 256Mi \
          --cpu 1

substitutions:
  _REGION: asia-south1
  _ARTIFACT_REPO: kaana
  _CLINIC_SERVICE: kaana-clinic

  # Frontend build-time envs
  _VITE_WHATSAPP_API: https://api.kaana.in/api
  _VITE_PLATFORM_URL: https://app.kaana.in
  _VITE_INBOX_URL: https://inbox.kaana.in

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/clinic:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPO}/clinic:latest

