    <script>
      (function () {
        try {
          var p = localStorage.getItem('kaana-theme');
          /* Default to light — our market (Indian SMBs) is light-first, WhatsApp-familiar */
          var dark = p === 'dark' || (p === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          var theme = dark ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', dark ? '#0b0f19' : '#ffffff');
        } catch (e) {}
      })();
    </script>
