# Kaana API — Render Blueprint
# Dashboard: New → Blueprint → connect this repo
# Or create Web Service manually using these settings.

services:
  - type: web
    name: kaana-api
    runtime: node
    region: singapore
    plan: starter
    rootDir: botiq-whatsapp-server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    disks:
      - name: kaana-data
        mountPath: /data
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3002"
      - key: DATABASE_PATH
        value: /data/kaana.db
      - key: WHATSAPP_PROVIDER
        value: meta
      - key: META_API_VERSION
        value: v21.0
      - key: KAANA_SELF_SERVE
        value: "false"
      - key: KAANA_CONCIERGE_SPOTS
        value: "10"
      - key: JWT_EXPIRES
        value: 7d
      - key: TYPING_DELAY_MS
        value: "350"
      # --- Set in Render dashboard (secrets) ---
      - key: PUBLIC_URL
        sync: false
      - key: LISTINGS_BASE_URL
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PLATFORM_ADMIN_EMAIL
        sync: false
      - key: PLATFORM_ADMIN_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: KAANA_NOTIFY_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: KAANA_PLATFORM_URL
        sync: false
      - key: KAANA_BOTIQ_URL
        sync: false
